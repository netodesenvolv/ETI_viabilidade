# Configurações oficiais para o Firebase App Hosting
# Documentação: https://firebase.google.com/docs/app-hosting/configure

kind: "AppHostingConfig"
schemaVersion: "v1"

runConfig:
  # Instâncias para garantir performance sem custo excessivo
  minInstances: 0
  maxInstances: 3
  # Memória configurada em MiB conforme o esquema v1
  memoryMiB: 1024
  # Timeout em segundos
  timeoutSeconds: 60

env:
  # Variáveis NEXT_PUBLIC precisam estar disponíveis no BUILD
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "" # Adicione o valor aqui ou no Console do Firebase
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: ""
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: ""
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: ""
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: ""
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: ""
    availability: [BUILD, RUNTIME]
  
  # Segredo para a API do Gemini (configurado via Secret Manager)
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
    availability: [RUNTIME]
