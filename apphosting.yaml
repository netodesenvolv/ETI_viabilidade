# Configurações oficiais para o Firebase App Hosting
# Documentação: https://firebase.google.com/docs/app-hosting/configure

kind: "AppHostingConfig"
schemaVersion: "v1"

runConfig:
  # Instâncias para garantir performance sem custo excessivo
  minInstances: 0
  maxInstances: 3
  # Memória configurada em MiB conforme o esquema v1
  memoryMiB: 1024
  # Timeout em segundos
  timeoutSeconds: 60

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    availability: [BUILD, RUNTIME]
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
    availability: [RUNTIME]
